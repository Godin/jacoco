name: CI
on:
  - push
  - pull_request
jobs:
  Linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - jdk: 6
            x64: true
          - jdk: 7
            x64: true
          - jdk: 8
            distribution: temurin
          - jdk: 8
            ecj: true
            distribution: temurin
          - jdk: 9
            x64: true
          - jdk: 10
            x64: true
          - jdk: 11
            # https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Hosted-Tool-Cache
            # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#java
            distribution: temurin
          - jdk: 11
            ecj: true
          - jdk: 12
            x64: true
          - jdk: 13
          - jdk: 14
            x64: true
          - jdk: 15
          - jdk: 16
          - jdk: 17
            distribution: temurin
          - jdk: 17
            ecj: true
            distribution: temurin
          - jdk: 18
          - jdk: 19
          - jdk: 20
          - jdk: 21
            distribution: temurin
          - jdk: 21
            ecj: true
            distribution: temurin
          - jdk: 22
          - jdk: 23
          - jdk: 23
            ecj: true
          - jdk: 24
          - jdk: 25
            distribution: temurin
          - jdk: 26
    name: JDK ${{ matrix.jdk }}${{ matrix.ecj && ' with ECJ' || ''}} ${{ matrix.x64 && 'x64' || 'arm' }}
    runs-on: ${{ matrix.x64 && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: ${{ matrix.distribution || 'zulu' }}
          java-version: |
            ${{ matrix.jdk }}
            21
      - &cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: maven-${{ runner.os }}
      - name:
        # First job from matrix to complete will save cache,
        # and it might contain not all modules (eg job `JDK 6`),
        # but their dependencies should be cached:
        run: |
          mvn --quiet dependency:go-offline
      - name: 'Generate toolchains.xml'
        env:
          JDK_VERSION: ${{ matrix.jdk }}
          JDK_HOME_VARIABLE_NAME: JAVA_HOME_${{ matrix.jdk }}_${{ matrix.x64 && 'X64' || 'ARM64' }}
        run: |
          echo "
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <id>$JDK_VERSION</id>
                <version>$JDK_VERSION</version>
              </provides>
              <configuration>
                <jdkHome>${!JDK_HOME_VARIABLE_NAME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          " > toolchains.xml
      - name: 'Build'
        run: |
          ./mvnw -V -B -e \
            verify -Djdk.version=${{ matrix.jdk }} -Dbytecode.version=${{ matrix.jdk }} \
            ${{ matrix.ecj && '-Decj' || ''}} \
            --toolchains=toolchains.xml
  Windows:
    runs-on: windows-2025
    environment: ${{ (github.repository == 'jacoco/jacoco' && github.ref == 'refs/heads/master') && 'snapshot' || null }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: |
            6
            21
      - *cache
      - name: 'Generate toolchains.xml'
        env:
          JDK_VERSION: 6
          JDK_HOME_VARIABLE_NAME: JAVA_HOME_6_X64
        shell: bash
        run: |
          echo "
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <id>$JDK_VERSION</id>
                <version>$JDK_VERSION</version>
              </provides>
              <configuration>
                <jdkHome>${!JDK_HOME_VARIABLE_NAME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          " > toolchains.xml
      - name: 'Build'
        shell: bash
        run: |
          ./mvnw -V -B -e \
            verify -Djdk.version=6 -Dbytecode.version=5 \
            -f org.jacoco.build \
            ${{ secrets.SONARQUBE_TOKEN && 'sonar:sonar' || '' }} \
            -Dsonar.scanner.skipJreProvisioning \
            -Dsonar.organization=default \
            -Dsonar.host.url=https://sonarcloud.io \
            --toolchains=toolchains.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact-upload-step
        with:
          name: jacoco
          path: jacoco/target/*.zip
          if-no-files-found: error
  CI:
    needs:
      - Linux
      - Windows
    # without following condition this job can have result "skipped" if needed job was "skipped"
    # auto-merge ignores skipped jobs even if they are required by branch protection rules
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check results of all needed jobs
        run: |
          R=$(echo "$NEEDS" | jq --compact-output '[.[].result] | unique')
          if [ "$R" = '["success"]' ]; then
            exit 0
          else
            exit 1
          fi
        env:
          NEEDS: ${{ toJSON(needs) }}
